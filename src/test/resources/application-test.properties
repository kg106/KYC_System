# ============================================================
# application-test.properties
# ============================================================
#
# This file is activated when @ActiveProfiles("test") is used.
# It OVERRIDES values from application.properties ONLY for tests.
#
# Place this file at: src/test/resources/application-test.properties
#
# WHY DO WE NEED A SEPARATE FILE?
# - We don't want tests sending real emails
# - We don't want tests connecting to your local PostgreSQL
#   (Testcontainers handles the real DB via DynamicPropertySource)
# - We can tune timeouts and logging for faster/quieter test runs
# ============================================================

# ── DATASOURCE ──────────────────────────────────────────────
# These will be OVERRIDDEN at runtime by @DynamicPropertySource
# in BaseIntegrationTest. The values below are just placeholders.
spring.datasource.url=jdbc:postgresql://localhost:5432/kyc_test
spring.datasource.username=test
spring.datasource.password=test

# ── FLYWAY ──────────────────────────────────────────────────
# Run Flyway migrations on the test Postgres container
# This creates all your tables automatically
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
#spring.flyway.baseline-version=0

# ── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
# Show SQL in test output (useful for debugging — disable if too noisy)
spring.jpa.show-sql=false

# ── REDIS ───────────────────────────────────────────────────
# Overridden by DynamicPropertySource — placeholders only
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── EMAIL (DISABLED FOR TESTS) ───────────────────────────────
# Without this, tests that trigger emails will fail or hang
# because there's no real SMTP server
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── TESSERACT OCR ────────────────────────────────────────────
# If Tesseract is not installed on the test machine, OCR will fail.
# Integration tests use fake image bytes, so OCR will fail gracefully.
# Consider mocking OcrService in unit tests for OCR-specific tests.
tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata

# ── JWT ─────────────────────────────────────────────────────
# Use a short expiry for tests so logout/blacklist tests work faster
app.jwt-secret=566d626154316a4c6a6d61324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a4132
app.jwt-expiration-milliseconds=900000
app.jwt-refresh-expiration-milliseconds=604800000

# ── SECURITY ─────────────────────────────────────────────────
app.encryption-secret=my-secret-encryption-key-32chars

# ── LOGGING ──────────────────────────────────────────────────
# Reduce noise during testing — only show warnings and errors
logging.level.root=WARN
logging.level.com.example.kyc_system=INFO
# Uncomment to debug Spring Security decisions:
# logging.level.org.springframework.security=DEBUG

# ── KYC SETTINGS ─────────────────────────────────────────────
kyc.storage.base-path=/tmp/kyc-test-uploads
kyc.file.max-size=10MB
kyc.file.allowed-types=application/pdf,image/jpeg,image/png

# ── REPORT SETTINGS ──────────────────────────────────────────
kyc.report.recipients=test@test.com