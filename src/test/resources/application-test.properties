# ── DATASOURCE (overridden at runtime by @DynamicPropertySource) ──────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/kyc_test
spring.datasource.username=test
spring.datasource.password=test

# ── JPA ───────────────────────────────────────────────────────────────────────
# 'create' not 'create-drop' — avoids shutdown deadlock with Testcontainers
# The Docker container is destroyed after tests, so explicit DROP is unnecessary
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# ── FLYWAY (disabled — JPA handles schema creation in tests) ──────────────────
spring.flyway.enabled=false

# ── REDIS (overridden at runtime by @DynamicPropertySource) ───────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── EMAIL (disabled — no real SMTP in tests) ──────────────────────────────────
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── TESSERACT ─────────────────────────────────────────────────────────────────
tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt-secret=566d626154316a4c6a6d61324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a4132
app.jwt-expiration-milliseconds=900000
app.jwt-refresh-expiration-milliseconds=604800000

# ── ENCRYPTION ────────────────────────────────────────────────────────────────
app.encryption-secret=my-secret-encryption-key-32chars

# ── KYC SETTINGS ──────────────────────────────────────────────────────────────
kyc.storage.base-path=/tmp/kyc-test-uploads
kyc.file.max-size=10MB
kyc.file.allowed-types=application/pdf,image/jpeg,image/png

# ── REPORT ────────────────────────────────────────────────────────────────────
kyc.report.recipients=test@test.com

# ── LOGGING ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example.kyc_system=INFO