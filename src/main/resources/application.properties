spring.application.name=kyc_system

# ===============================
# Datasource
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5433/kyc_db_copy
spring.datasource.username=test_user
spring.datasource.password=system

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# Spring Multipart
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# KYC Custom Properties
# ===============================
kyc.storage.base-path=/data/kyc
kyc.file.max-size=10MB
kyc.file.allowed-types=application/pdf,image/jpeg,image/png
tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata
app.encryption-secret=my-secret-encryption-key-32chars

# ===============================
# JWT Configuration
# ===============================
app.jwt-secret=566d626154316a4c6a6d61324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a41324e6a4132
app.jwt-expiration-milliseconds=900000

# ===============================
# Email Configuration (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=karangondaliya02@gmail.com
spring.mail.password=pqimkgkmfsdftlqt
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# Valkey/Redis Configuration
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
app.jwt-refresh-expiration-milliseconds=604800000

# application.properties
kyc.report.recipients=karangondaliya10@gmail.com

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# baseline-on-migrate=true is CRITICAL for existing databases
# It tells Flyway "the DB already exists, start tracking from here"
spring.flyway.baseline-version=0


# =============================================
# Optional but helpful during first run
# =============================================
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true