version: '3.9'

services:

  kyc-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kyc_application
    restart: unless-stopped
    network_mode: host        # keeps access to your local PostgreSQL on localhost:5433

    environment:
      # ── Spring Profile ──
      SPRING_PROFILES_ACTIVE: docker

      # ── Database (pointing to your local PostgreSQL via host network) ──
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # ── JPA ──
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

      # ── Redis (localhost because network_mode: host) ──
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379

      # ── Tesseract ──
      TESSERACT_DATAPATH: /usr/share/tesseract-ocr/5/tessdata

      # ── JWT ──
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MILLISECONDS: ${APP_JWT_EXPIRATION_MILLISECONDS:-86400000}
      APP_JWT_REFRESH_EXPIRATION_MILLISECONDS: ${APP_JWT_REFRESH_EXPIRATION_MILLISECONDS:-604800000}

      # ── Encryption ──
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET}

      # ── Mail ──
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"

      # ── File Upload ──
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
      KYC_UPLOAD_DIR: /app/uploads

      # ── KYC Settings ──
      KYC_STORAGE_BASE_PATH: /app/uploads
      KYC_FILE_MAX_SIZE: 10MB
      KYC_FILE_ALLOWED_TYPES: application/pdf,image/jpeg,image/png
      KYC_REPORT_RECIPIENTS: ${KYC_REPORT_RECIPIENTS:-admin@kyc.local}

      # ── Actuator ──
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always

    volumes:
      - kyc_uploads:/app/uploads
      - kyc_logs:/app/logs

volumes:
  kyc_uploads:
    driver: local
  kyc_logs:
    driver: local