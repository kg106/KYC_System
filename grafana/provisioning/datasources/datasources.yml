apiVersion: 1

datasources:

  # ── Prometheus (already working) ────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  # ── Loki (new — for logs) ───────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      # Link Loki log lines to Prometheus traces via shared labels
      derivedFields:
        - name: traceId
          matcherRegex: '"traceId":"(\w+)"'
          url: ""
          datasourceUid: ""